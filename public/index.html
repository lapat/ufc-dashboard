<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UFC Live Odds — DraftKings</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #eee; font-family: 'Helvetica Neue', sans-serif; padding: 28px; max-width: 900px; margin: 0 auto; }

    header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; border-bottom: 1px solid #222; padding-bottom: 16px; }
    h1 { color: #e8b84b; font-size: 1.5rem; letter-spacing: 1px; text-transform: uppercase; }
    #status { font-size: 0.75rem; color: #555; }

    /* Usage footer */
    #usage-footer {
      margin-top: 48px; padding-top: 12px; border-top: 1px solid #1a1a1a;
      display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
    }
    .uf-item { font-size: 0.68rem; color: #3a3a3a; }
    .uf-item span { color: #555; }

    .section-label { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px; }

    .fight-card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 14px 18px;
      margin-bottom: 8px;
      transition: border-color 0.3s;
    }
    .fight-card.live { border-color: #e8b84b; background: #1a1800; }
    .fight-card.live .event-label { color: #e8b84b; }

    .event-label { font-size: 0.65rem; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

    .matchup { display: grid; grid-template-columns: 1fr auto auto auto 1fr; align-items: center; gap: 12px; }

    .fighter-name { font-size: 0.95rem; font-weight: 600; }
    .fighter-name.right { text-align: right; }

    .odds-pill {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 4px;
      min-width: 72px;
      text-align: center;
    }
    .fav  { color: #ff6b6b; background: #1f0f0f; }
    .dog  { color: #69db7c; background: #0d1f10; }
    .even { color: #74c0fc; background: #0d1525; }

    .vs { color: #333; font-size: 0.75rem; font-weight: 600; }
    .fight-time { font-size: 0.65rem; color: #444; margin-top: 8px; text-align: right; }

    #no-odds { color: #444; text-align: center; padding: 60px 0; font-size: 0.9rem; line-height: 1.8; }

    /* ── Chat widget ── */
    #chat-fab {
      position: fixed; bottom: 28px; right: 28px;
      width: 52px; height: 52px; border-radius: 50%;
      background: #e8b84b; border: none; cursor: pointer;
      font-size: 1.4rem; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5); z-index: 100;
      transition: transform 0.15s;
    }
    #chat-fab:hover { transform: scale(1.08); }

    #chat-panel {
      position: fixed; bottom: 92px; right: 28px;
      width: 380px; max-height: 540px;
      background: #161616; border: 1px solid #2a2a2a; border-radius: 12px;
      display: none; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 99;
      overflow: hidden;
    }
    #chat-panel.open { display: flex; }

    #chat-header {
      padding: 12px 16px; background: #1a1a1a; border-bottom: 1px solid #222;
      display: flex; justify-content: space-between; align-items: center;
    }
    #chat-header-title { color: #e8b84b; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    #chat-usage { font-size: 0.65rem; color: #555; }

    #chat-messages {
      flex: 1; overflow-y: auto; padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
      min-height: 200px;
    }
    .msg { font-size: 0.82rem; line-height: 1.6; padding: 10px 12px; border-radius: 8px; max-width: 94%; }
    .msg.user { background: #222; color: #ccc; align-self: flex-end; white-space: pre-wrap; }
    .msg.assistant { background: #1e2a1e; color: #b8e6b8; align-self: flex-start; border: 1px solid #2a3a2a; }
    .msg.thinking { color: #555; font-style: italic; background: none; border: none; padding: 4px 0; }
    /* Markdown rendered inside assistant messages */
    .msg.assistant p { margin-bottom: 0.6em; }
    .msg.assistant p:last-child { margin-bottom: 0; }
    .msg.assistant strong { color: #e8b84b; }
    .msg.assistant table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 0.78rem; }
    .msg.assistant th { background: #253325; color: #e8b84b; padding: 4px 8px; border: 1px solid #2a3a2a; text-align: left; }
    .msg.assistant td { padding: 4px 8px; border: 1px solid #2a3a2a; }
    .msg.assistant tr:nth-child(even) td { background: #1a2a1a; }
    .msg.assistant h1,.msg.assistant h2,.msg.assistant h3 { color: #e8b84b; margin: 8px 0 4px; font-size: 0.88rem; }
    .msg.assistant ul,.msg.assistant ol { padding-left: 1.4em; margin: 4px 0; }
    .msg.assistant li { margin-bottom: 2px; }
    .msg.assistant code { background: #0d1a0d; padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 0.78rem; color: #a8d8a8; }
    .msg.assistant pre { background: #0d1a0d; padding: 8px; border-radius: 4px; overflow-x: auto; margin: 6px 0; }
    .msg.assistant pre code { background: none; padding: 0; }

    #chat-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #222; }
    #chat-input {
      flex: 1; background: #111; border: 1px solid #333; border-radius: 6px;
      color: #eee; padding: 8px 12px; font-size: 0.82rem; font-family: inherit; outline: none;
      resize: none; height: 36px;
    }
    #chat-input:focus { border-color: #e8b84b; }
    #chat-send {
      background: #e8b84b; color: #000; border: none; border-radius: 6px;
      padding: 0 14px; font-weight: 700; font-size: 0.8rem; cursor: pointer;
    }
    #chat-send:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>UFC Odds — DraftKings</h1>
    <div id="status">Loading...</div>
  </header>

  <div id="fights"></div>

  <div id="usage-footer">
    <div class="uf-item">Odds API — <span id="uf-credits-remaining">—</span> credits remaining · <span id="uf-credits-used">—</span> used</div>
    <div class="uf-item">AI — <span id="uf-ai-queries">0</span> queries · <span id="uf-ai-cost">$0.0000</span></div>
  </div>

  <!-- Floating chat widget -->
  <button id="chat-fab" title="Fight Research">💬</button>

  <div id="chat-panel">
    <div id="chat-header">
      <span id="chat-header-title">Fight Research</span>
      <span id="chat-usage">0 queries · $0.000</span>
    </div>
    <div id="chat-messages">
      <div class="msg assistant">Ask me anything — fighter history, crossovers, current odds, win-win windows. Try: "Show me Topuria's last 3 fights"</div>
    </div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="Ask about any fighter or fight..." />
      <button id="chat-send">Send</button>
    </div>
  </div>

  <script>
    function oddsClass(price) {
      if (price < 0) return 'fav';
      if (price > 0) return 'dog';
      return 'even';
    }

    function fmt(price) {
      if (typeof price !== 'number') return '—';
      return price > 0 ? `+${price}` : `${price}`;
    }

    function isLive(commenceTime) {
      const start = new Date(commenceTime).getTime();
      const now = Date.now();
      return start <= now && now - start < 3 * 60 * 60 * 1000;
    }

    async function load() {
      const status = document.getElementById('status');
      const container = document.getElementById('fights');
      try {
        const res = await fetch('/api/ufc');
        const fights = await res.json();

        // Only show fights with actual DraftKings odds
        const withOdds = fights.filter(f => {
          const dk = f.bookmakers?.[0];
          const market = dk?.markets?.find(m => m.key === 'h2h');
          return market?.outcomes?.length >= 2;
        });

        const live = withOdds.filter(f => isLive(f.commence_time));
        const upcoming = withOdds.filter(f => !isLive(f.commence_time));

        status.textContent = `Updated ${new Date().toLocaleTimeString()} · ${withOdds.length} fights with odds · ${fights.length} total`;
        container.innerHTML = '';

        if (!withOdds.length) {
          container.innerHTML = `<div id="no-odds">No DraftKings odds posted right now.<br>Check back closer to fight night.</div>`;
          return;
        }

        function renderFight(fight, liveFlag) {
          const dk = fight.bookmakers[0];
          const outcomes = dk.markets.find(m => m.key === 'h2h').outcomes;
          const [a, b] = outcomes;

          const card = document.createElement('div');
          card.className = `fight-card${liveFlag ? ' live' : ''}`;
          card.innerHTML = `
            <div class="event-label">${liveFlag ? '● LIVE — ' : ''}${fight.sport_title}</div>
            <div class="matchup">
              <div class="fighter-name">${a.name}</div>
              <div class="odds-pill ${oddsClass(a.price)}">${fmt(a.price)}</div>
              <div class="vs">VS</div>
              <div class="odds-pill ${oddsClass(b.price)}">${fmt(b.price)}</div>
              <div class="fighter-name right">${b.name}</div>
            </div>
            <div class="fight-time">${new Date(fight.commence_time).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}</div>
          `;
          return card;
        }

        if (live.length) {
          const lbl = document.createElement('div');
          lbl.className = 'section-label';
          lbl.textContent = 'Live Now';
          container.appendChild(lbl);
          live.forEach(f => container.appendChild(renderFight(f, true)));
        }

        if (upcoming.length) {
          const lbl = document.createElement('div');
          lbl.className = 'section-label';
          lbl.textContent = 'Upcoming';
          container.appendChild(lbl);
          upcoming.forEach(f => container.appendChild(renderFight(f, false)));
        }

      } catch (e) {
        status.textContent = 'Error — is the server running?';
        console.error(e);
      }
    }

    load();
    setInterval(load, 10000);

    // ── Usage footer ─────────────────────────────────────
    async function loadCredits() {
      try {
        const r = await fetch('/api/credits');
        const d = await r.json();
        if (d.oddsApi.remaining !== null) {
          document.getElementById('uf-credits-remaining').textContent = d.oddsApi.remaining.toLocaleString();
          document.getElementById('uf-credits-used').textContent = d.oddsApi.used.toLocaleString();
        }
        document.getElementById('uf-ai-cost').textContent = '$' + d.anthropic.estimatedCostUSD.toFixed(4);
        document.getElementById('uf-ai-queries').textContent = d.anthropic.sessionQueries;
      } catch {}
    }
    loadCredits();
    setInterval(loadCredits, 30000);

    // ── Chat widget ──────────────────────────────────────
    const fab       = document.getElementById('chat-fab');
    const panel     = document.getElementById('chat-panel');
    const messages  = document.getElementById('chat-messages');
    const input     = document.getElementById('chat-input');
    const sendBtn   = document.getElementById('chat-send');
    const usageLbl  = document.getElementById('chat-usage');

    fab.addEventListener('click', () => {
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) input.focus();
    });

    function addMsg(text, role) {
      const d = document.createElement('div');
      d.className = `msg ${role}`;
      if (role === 'assistant' && typeof marked !== 'undefined') {
        d.innerHTML = marked.parse(text);
      } else {
        d.textContent = text;
      }
      messages.appendChild(d);
      messages.scrollTop = messages.scrollHeight;
      return d;
    }

    async function sendMessage() {
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      sendBtn.disabled = true;
      addMsg(q, 'user');
      const thinking = addMsg('Researching...', 'thinking');
      try {
        const res = await fetch('/api/research', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q }),
        });
        const data = await res.json();
        thinking.remove();
        addMsg(data.answer || data.error, 'assistant');
        if (data.usage) {
          usageLbl.textContent = `${data.usage.sessionQueries} queries · $${data.usage.estimatedCostUSD.toFixed(3)}`;
        }
        // Refresh usage bar after a query
        loadCredits();
      } catch (e) {
        thinking.remove();
        addMsg('Error: ' + e.message, 'assistant');
      }
      sendBtn.disabled = false;
      input.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
