<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UFC Live Odds — DraftKings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #eee; font-family: 'Helvetica Neue', sans-serif; padding: 28px; max-width: 900px; margin: 0 auto; }

    header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; border-bottom: 1px solid #222; padding-bottom: 16px; }
    h1 { color: #e8b84b; font-size: 1.5rem; letter-spacing: 1px; text-transform: uppercase; }
    #status { font-size: 0.75rem; color: #555; }

    .section-label { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin: 20px 0 10px; }

    .fight-card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 14px 18px;
      margin-bottom: 8px;
      transition: border-color 0.3s;
    }
    .fight-card.live { border-color: #e8b84b; background: #1a1800; }
    .fight-card.live .event-label { color: #e8b84b; }

    .event-label { font-size: 0.65rem; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

    .matchup { display: grid; grid-template-columns: 1fr auto auto auto 1fr; align-items: center; gap: 12px; }

    .fighter-name { font-size: 0.95rem; font-weight: 600; }
    .fighter-name.right { text-align: right; }

    .odds-pill {
      font-size: 1.1rem;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 4px;
      min-width: 72px;
      text-align: center;
    }
    .fav  { color: #ff6b6b; background: #1f0f0f; }
    .dog  { color: #69db7c; background: #0d1f10; }
    .even { color: #74c0fc; background: #0d1525; }

    .vs { color: #333; font-size: 0.75rem; font-weight: 600; }
    .fight-time { font-size: 0.65rem; color: #444; margin-top: 8px; text-align: right; }

    #no-odds { color: #444; text-align: center; padding: 60px 0; font-size: 0.9rem; line-height: 1.8; }

    .ask-section { margin-top: 40px; border-top: 1px solid #222; padding-top: 24px; }
    .ask-section h2 { color: #e8b84b; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
    .ask-row { display: flex; gap: 10px; }
    #ask-input {
      flex: 1; background: #161616; border: 1px solid #333; border-radius: 6px;
      color: #eee; padding: 10px 14px; font-size: 0.9rem; font-family: inherit;
      outline: none;
    }
    #ask-input:focus { border-color: #e8b84b; }
    #ask-btn {
      background: #e8b84b; color: #000; border: none; border-radius: 6px;
      padding: 10px 20px; font-weight: 700; font-size: 0.85rem; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px;
    }
    #ask-btn:disabled { opacity: 0.4; cursor: default; }
    #ask-answer {
      margin-top: 14px; background: #161616; border: 1px solid #2a2a2a;
      border-radius: 6px; padding: 14px 16px; font-size: 0.85rem; line-height: 1.7;
      color: #ccc; white-space: pre-wrap; display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>UFC Odds — DraftKings</h1>
    <div id="status">Loading...</div>
  </header>
  <div id="fights"></div>

  <div class="ask-section">
    <h2>Ask About Historical Data</h2>
    <div class="ask-row">
      <input id="ask-input" type="text" placeholder="e.g. How many fights had win-win crossovers?" />
      <button id="ask-btn">Ask</button>
    </div>
    <div id="ask-answer"></div>
  </div>

  <script>
    function oddsClass(price) {
      if (price < 0) return 'fav';
      if (price > 0) return 'dog';
      return 'even';
    }

    function fmt(price) {
      if (typeof price !== 'number') return '—';
      return price > 0 ? `+${price}` : `${price}`;
    }

    function isLive(commenceTime) {
      const start = new Date(commenceTime).getTime();
      const now = Date.now();
      return start <= now && now - start < 3 * 60 * 60 * 1000;
    }

    async function load() {
      const status = document.getElementById('status');
      const container = document.getElementById('fights');
      try {
        const res = await fetch('/api/ufc');
        const fights = await res.json();

        // Only show fights with actual DraftKings odds
        const withOdds = fights.filter(f => {
          const dk = f.bookmakers?.[0];
          const market = dk?.markets?.find(m => m.key === 'h2h');
          return market?.outcomes?.length >= 2;
        });

        const live = withOdds.filter(f => isLive(f.commence_time));
        const upcoming = withOdds.filter(f => !isLive(f.commence_time));

        status.textContent = `Updated ${new Date().toLocaleTimeString()} · ${withOdds.length} fights with odds · ${fights.length} total`;
        container.innerHTML = '';

        if (!withOdds.length) {
          container.innerHTML = `<div id="no-odds">No DraftKings odds posted right now.<br>Check back closer to fight night.</div>`;
          return;
        }

        function renderFight(fight, liveFlag) {
          const dk = fight.bookmakers[0];
          const outcomes = dk.markets.find(m => m.key === 'h2h').outcomes;
          const [a, b] = outcomes;

          const card = document.createElement('div');
          card.className = `fight-card${liveFlag ? ' live' : ''}`;
          card.innerHTML = `
            <div class="event-label">${liveFlag ? '● LIVE — ' : ''}${fight.sport_title}</div>
            <div class="matchup">
              <div class="fighter-name">${a.name}</div>
              <div class="odds-pill ${oddsClass(a.price)}">${fmt(a.price)}</div>
              <div class="vs">VS</div>
              <div class="odds-pill ${oddsClass(b.price)}">${fmt(b.price)}</div>
              <div class="fighter-name right">${b.name}</div>
            </div>
            <div class="fight-time">${new Date(fight.commence_time).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}</div>
          `;
          return card;
        }

        if (live.length) {
          const lbl = document.createElement('div');
          lbl.className = 'section-label';
          lbl.textContent = 'Live Now';
          container.appendChild(lbl);
          live.forEach(f => container.appendChild(renderFight(f, true)));
        }

        if (upcoming.length) {
          const lbl = document.createElement('div');
          lbl.className = 'section-label';
          lbl.textContent = 'Upcoming';
          container.appendChild(lbl);
          upcoming.forEach(f => container.appendChild(renderFight(f, false)));
        }

      } catch (e) {
        status.textContent = 'Error — is the server running?';
        console.error(e);
      }
    }

    load();
    setInterval(load, 10000);

    document.getElementById('ask-btn').addEventListener('click', async () => {
      const input = document.getElementById('ask-input');
      const answer = document.getElementById('ask-answer');
      const btn = document.getElementById('ask-btn');
      const q = input.value.trim();
      if (!q) return;
      btn.disabled = true;
      btn.textContent = 'Thinking...';
      answer.style.display = 'block';
      answer.textContent = '...';
      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q }),
        });
        const data = await res.json();
        answer.textContent = data.answer || data.error;
      } catch (e) {
        answer.textContent = 'Error: ' + e.message;
      }
      btn.disabled = false;
      btn.textContent = 'Ask';
    });

    document.getElementById('ask-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('ask-btn').click();
    });
  </script>
</body>
</html>
