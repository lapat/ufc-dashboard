<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bet Bot — Recordings</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#ccc;font-family:'SF Mono',monospace;font-size:13px}
    a{color:inherit;text-decoration:none}

    #topbar{display:flex;align-items:center;background:#111;border-bottom:1px solid #1e1e1e;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
    #topbar h1{color:#e8b84b;font-size:0.9rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:13px 0;white-space:nowrap}
    .nav-link{font-size:0.65rem;color:#555;padding:4px 8px;border-radius:3px;border:1px solid #222}
    .nav-link:hover{color:#888;border-color:#333}

    #main{max-width:1020px;margin:0 auto;padding:24px}

    #live-section{margin-bottom:32px}
    .section-title{font-size:0.6rem;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
    .live-card{background:#1a0a0a;border:1px solid #3a1a1a;border-radius:6px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .live-dot{width:8px;height:8px;border-radius:50%;background:#e74c3c;animation:pulse 1.2s infinite;flex-shrink:0}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .live-fighters{font-weight:700;font-size:0.85rem;color:#fff;flex:1}
    .live-started{font-size:0.6rem;color:#444}
    .live-pts{font-size:0.65rem;color:#666;white-space:nowrap}
    .no-live{color:#2a2a2a;font-size:0.75rem;padding:12px 0}

    #filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
    .filter-pill{font-size:0.6rem;padding:4px 10px;border-radius:12px;border:1px solid #222;color:#444;cursor:pointer;background:none}
    .filter-pill:hover,.filter-pill.active{border-color:#e8b84b;color:#e8b84b}
    #search-box{font-size:0.65rem;padding:4px 10px;background:#111;border:1px solid #222;border-radius:4px;color:#888;outline:none;width:180px}
    #search-box:focus{border-color:#333}
    #sort-sel{font-size:0.6rem;padding:4px 8px;background:#111;border:1px solid #222;border-radius:4px;color:#555;outline:none;cursor:pointer}
    #rec-count{font-size:0.6rem;color:#333;margin-left:auto}

    #rec-table{width:100%;border-collapse:collapse}
    .rec-row{border-bottom:1px solid #111;cursor:pointer;transition:background 0.1s}
    .rec-row:hover{background:#111}
    .rec-row.selected{background:#0d1500;border-left:2px solid #e8b84b}
    .rec-row td{padding:10px 12px;vertical-align:middle}
    .sport-badge{font-size:0.55rem;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:1px;font-weight:700;white-space:nowrap}
    .badge-ufc{background:#2a1a0a;color:#e8b84b;border:1px solid #3a2a0a}
    .badge-nhl{background:#0a1a2a;color:#69b3e7;border:1px solid #0a2a3a}
    .badge-nba{background:#1a0a1a;color:#c084fc;border:1px solid #2a0a2a}
    .badge-nfl{background:#0a1a0a;color:#69db7c;border:1px solid #0a2a0a}
    .badge-mlb{background:#1a1a0a;color:#fbbf24;border:1px solid #2a2a0a}
    .badge-other{background:#1a1a1a;color:#888;border:1px solid #222}
    .fighters-cell{font-weight:600;color:#ddd;font-size:0.75rem}
    .date-cell{color:#444;font-size:0.65rem;white-space:nowrap}
    .pts-cell{color:#555;font-size:0.65rem;text-align:right}
    .xover-cell{text-align:right}
    .xover-badge{font-size:0.6rem;color:#e8b84b}
    .xover-zero{font-size:0.6rem;color:#2a2a2a}
    .open-btn{font-size:0.55rem;padding:3px 8px;background:#111;border:1px solid #222;color:#444;border-radius:3px;cursor:pointer;white-space:nowrap}
    .open-btn:hover,.open-btn.active{border-color:#e8b84b;color:#e8b84b}
    th{font-size:0.55rem;color:#333;text-transform:uppercase;letter-spacing:1px;padding:6px 12px;text-align:left;border-bottom:1px solid #1a1a1a;font-weight:400}
    th.right{text-align:right}

    /* ── Inline expansion row ── */
    .sim-expansion-td{padding:0!important;border-bottom:2px solid #e8b84b33}
    .sim-panel-inner{background:#0d0d0d;border-left:2px solid #e8b84b33;padding:16px 20px}
    .sim-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
    .sim-hdr-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .sim-fight-name{font-size:0.85rem;font-weight:700;color:#fff}
    .sim-meta{font-size:0.65rem;color:#444}
    .sim-xover-tag{font-size:0.65rem;color:#e8b84b}
    .sim-note{font-size:0.68rem;color:#555;font-style:italic;margin-bottom:10px}
    .chart-wrap{height:190px;position:relative;margin-bottom:12px}
    .sim-canvas{width:100%;height:100%}
    .sim-legend{display:flex;gap:14px;margin-bottom:8px}
    .leg-item{display:flex;align-items:center;gap:5px;font-size:0.68rem;color:#555}
    .leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .leg-f1c{background:#e8b84b}
    .leg-f2c{background:#69b3e7}
    .sim-controls{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
    .sc-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#666;border-radius:4px;padding:4px 10px;font-size:0.78rem;cursor:pointer;font-family:'SF Mono',monospace;transition:all .15s}
    .sc-btn:hover{border-color:#444;color:#aaa}
    .sc-btn.play{background:#0d2a0d;border-color:#69db7c44;color:#69db7c}
    .sc-btn.pause-b{background:#1a1800;border-color:#e8b84b44;color:#e8b84b}
    .sc-btn.close-b{color:#555;border-color:#2a2a2a}
    .sc-btn.close-b:hover{color:#e74c3c;border-color:#8b000044}
    .sc-btn.spd-active{background:#1c1800;border-color:#e8b84b55;color:#e8b84b}
    .prog-wrap{flex:1;min-width:80px}
    .prog-bg{background:#1a1a1a;border-radius:2px;height:3px}
    .prog-fill{height:3px;border-radius:2px;background:#e8b84b;transition:width .1s}
    .prog-lbl{font-size:0.68rem;color:#2a2a2a;margin-top:3px}
  </style>
</head>
<body>

<div id="topbar">
  <h1>⚡ Bet Bot</h1>
  <a href="/" class="nav-link">← Live</a>
  <span style="font-size:0.65rem;color:#e8b84b;padding:4px 8px;border:1px solid #3a2a0a;border-radius:3px">Recordings</span>
  <a href="/patterns" class="nav-link">Patterns</a>
</div>

<div id="main">
  <div id="live-section">
    <div class="section-title">Recording now</div>
    <div id="live-list"><div class="no-live">No live recordings active</div></div>
  </div>

  <div class="section-title">All recorded fights</div>
  <div id="filters">
    <button class="filter-pill active" data-sport="all">All</button>
    <button class="filter-pill" data-sport="UFC/MMA">UFC/MMA</button>
    <button class="filter-pill" data-sport="NHL">NHL</button>
    <button class="filter-pill" data-sport="NBA">NBA</button>
    <button class="filter-pill" data-sport="NFL">NFL</button>
    <button class="filter-pill" data-sport="MLB">MLB</button>
    <input id="search-box" placeholder="search fighters..."/>
    <select id="sort-sel">
      <option value="date">Newest first</option>
      <option value="xovers">Most crossovers</option>
      <option value="pts">Most data pts</option>
    </select>
    <span id="rec-count"></span>
  </div>

  <table id="rec-table">
    <thead><tr>
      <th>Sport</th>
      <th>Matchup</th>
      <th>Date</th>
      <th class="right">Points</th>
      <th class="right">Crossovers</th>
      <th></th>
    </tr></thead>
    <tbody id="rec-body"><tr><td colspan="6" style="color:#2a2a2a;padding:20px 12px">Loading...</td></tr></tbody>
  </table>
</div>

<script>
Chart.register(window['chartjs-plugin-annotation']);

let allRecs=[], activeSportFilter='all', searchQuery='', sortMode='date';
let simChart=null, simReplayTimer=null, simReplayIdx=0, simReplayData=null, simReplayRunning=false;
let selectedRowId=null;

// The expansion row — a single <tr> we move around in the table
const simTr=document.createElement('tr');
simTr.id='sim-expansion-row';
simTr.innerHTML=`<td colspan="6" class="sim-expansion-td">
  <div class="sim-panel-inner">
    <div class="sim-hdr">
      <div class="sim-hdr-left">
        <span class="sim-fight-name" id="sp-name">—</span>
        <span class="sim-meta" id="sp-date"></span>
        <span class="sim-xover-tag" id="sp-xovers"></span>
      </div>
      <button class="sc-btn close-b" id="sp-close">✕ Close</button>
    </div>
    <div class="sim-note" id="sp-note" style="display:none"></div>
    <div class="sim-legend" id="sp-legend" style="display:none">
      <div class="leg-item"><div class="leg-dot leg-f1c"></div><span id="sp-f1-name">Fighter 1</span></div>
      <div class="leg-item"><div class="leg-dot leg-f2c"></div><span id="sp-f2-name">Fighter 2</span></div>
    </div>
    <div class="chart-wrap" id="sp-chart-wrap" style="display:none">
      <canvas class="sim-canvas" id="sp-canvas"></canvas>
    </div>
    <div class="sim-controls" id="sp-controls" style="display:none">
      <span class="prog-lbl">Speed:</span>
      <button class="sc-btn spd-active" data-spd="10">10×</button>
      <button class="sc-btn" data-spd="50">50×</button>
      <button class="sc-btn" data-spd="100">100×</button>
      <button class="sc-btn play" id="sp-replay">▶ Replay</button>
      <button class="sc-btn" id="sp-stop" style="display:none">⏹ Stop</button>
      <div class="prog-wrap">
        <div class="prog-bg"><div class="prog-fill" id="sp-fill" style="width:0%"></div></div>
        <div class="prog-lbl" id="sp-prog"></div>
      </div>
    </div>
  </div>
</td>`;

function spEl(id){ return simTr.querySelector('#'+id)||document.getElementById(id); }

document.getElementById('sp-close')||simTr.querySelector('#sp-close').addEventListener('click', closeSim);
simTr.querySelector('#sp-close').addEventListener('click', closeSim);

simTr.querySelectorAll('[data-spd]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    simTr.querySelectorAll('[data-spd]').forEach(b=>b.classList.remove('spd-active'));
    btn.classList.add('spd-active');
    if(simReplayRunning){ stopReplay(); startReplay(); }
  });
});

simTr.querySelector('#sp-replay').addEventListener('click',()=>{
  if(simReplayRunning){ stopReplay(); return; }
  startReplay();
});

simTr.querySelector('#sp-stop').addEventListener('click',()=>{
  stopReplay();
  // Restore full graph
  if(simReplayData) renderFullGraph(simReplayData);
});

function getSpeed(){
  const active=simTr.querySelector('[data-spd].spd-active');
  return active?+active.dataset.spd:10;
}

function closeSim(){
  stopReplay();
  if(simTr.parentNode) simTr.parentNode.removeChild(simTr);
  if(simChart){ simChart.destroy(); simChart=null; }
  selectedRowId=null;
  renderTable();
}

function buildAnnotations(h){
  const anns={};
  for(let i=1;i<h.length;i++){
    const p=h[i-1],c=h[i];
    if((p.fighter1.numericOdds>0&&c.fighter1.numericOdds<0)||(p.fighter2.numericOdds>0&&c.fighter2.numericOdds<0)){
      anns['x'+i]={type:'line',xMin:i,xMax:i,borderColor:'#e8b84b',borderWidth:1.5,borderDash:[3,3],
        label:{content:'⚡',display:true,position:'start',color:'#e8b84b',font:{size:10}}};
    }
  }
  return anns;
}

function initChart(){
  if(simChart){ simChart.destroy(); simChart=null; }
  const ctx=simTr.querySelector('#sp-canvas').getContext('2d');
  simChart=new Chart(ctx,{
    type:'line',
    data:{ labels:[], datasets:[
      {label:'F1',data:[],borderColor:'#e8b84b',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.3},
      {label:'F2',data:[],borderColor:'#69b3e7',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.3}
    ]},
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      scales:{
        x:{ticks:{color:'#333',font:{size:9},maxTicksLimit:8},grid:{color:'#1a1a1a'},border:{color:'#222'}},
        y:{ticks:{color:'#444',font:{size:9},callback:v=>v>0?`+${v}`:v},grid:{color:'#1a1a1a'},border:{color:'#222'}}
      },
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw>0?'+':''}${ctx.raw}`}},
        annotation:{annotations:{}}
      }
    }
  });
}

function renderFullGraph(h){
  if(!simChart) initChart();
  const f1n=h[0].fighter1.name, f2n=h[0].fighter2.name;
  simChart.data.labels=h.map(pt=>new Date(pt.timestamp).toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}));
  simChart.data.datasets[0].label=f1n; simChart.data.datasets[0].data=h.map(pt=>pt.fighter1.numericOdds);
  simChart.data.datasets[1].label=f2n; simChart.data.datasets[1].data=h.map(pt=>pt.fighter2.numericOdds);
  simChart.options.plugins.annotation.annotations=buildAnnotations(h);
  simChart.update('none');
  spEl('sp-fill').style.width='100%';
  spEl('sp-prog').textContent=h.length+' pts';
}

function startReplay(){
  if(!simReplayData) return;
  const h=simReplayData.oddsHistory||[];
  if(h.length<2) return;
  stopReplay();
  simReplayIdx=0;
  // Clear chart
  simChart.data.labels=[];
  simChart.data.datasets[0].data=[];
  simChart.data.datasets[1].data=[];
  simChart.options.plugins.annotation.annotations={};
  simChart.update('none');
  spEl('sp-fill').style.width='0%';
  spEl('sp-prog').textContent='';
  spEl('sp-replay').textContent='⏸ Pause'; spEl('sp-replay').className='sc-btn pause-b';
  spEl('sp-stop').style.display='';
  simReplayRunning=true;
  const spd=getSpeed();
  const anns={};
  simReplayTimer=setInterval(()=>{
    if(simReplayIdx>=h.length){
      clearInterval(simReplayTimer); simReplayTimer=null; simReplayRunning=false;
      simChart.options.plugins.annotation.annotations=anns; simChart.update('none');
      spEl('sp-replay').textContent='▶ Replay'; spEl('sp-replay').className='sc-btn play';
      spEl('sp-stop').style.display='none';
      spEl('sp-fill').style.width='100%';
      spEl('sp-prog').textContent=h.length+' pts';
      return;
    }
    const pt=h[simReplayIdx];
    const ts=new Date(pt.timestamp).toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
    simChart.data.labels.push(ts);
    simChart.data.datasets[0].data.push(pt.fighter1.numericOdds);
    simChart.data.datasets[1].data.push(pt.fighter2.numericOdds);
    if(simReplayIdx>0){
      const p=h[simReplayIdx-1],c=h[simReplayIdx];
      if((p.fighter1.numericOdds>0&&c.fighter1.numericOdds<0)||(p.fighter2.numericOdds>0&&c.fighter2.numericOdds<0)){
        anns['x'+simReplayIdx]={type:'line',xMin:simReplayIdx,xMax:simReplayIdx,borderColor:'#e8b84b',borderWidth:1.5,borderDash:[3,3],
          label:{content:'⚡',display:true,position:'start',color:'#e8b84b',font:{size:10}}};
        simChart.options.plugins.annotation.annotations={...anns};
      }
    }
    simChart.update('none');
    const pct=((simReplayIdx+1)/h.length*100).toFixed(1);
    spEl('sp-fill').style.width=pct+'%';
    spEl('sp-prog').textContent=(simReplayIdx+1)+'/'+h.length+' pts';
    simReplayIdx++;
  }, Math.max(16, 1000/spd));
}

function stopReplay(){
  if(simReplayTimer){ clearInterval(simReplayTimer); simReplayTimer=null; }
  simReplayRunning=false;
  spEl('sp-replay').textContent='▶ Replay'; spEl('sp-replay').className='sc-btn play';
  spEl('sp-stop').style.display='none';
}

async function openSim(id, f1, f2, date, xovers, clickedRow){
  stopReplay();
  simReplayData=null;
  selectedRowId=id;

  // Move the expansion row to right after the clicked row
  clickedRow.after(simTr);

  // Reset UI
  spEl('sp-name').textContent=`${f1} vs ${f2}`;
  spEl('sp-date').textContent=fmtDate(date);
  spEl('sp-xovers').textContent=xovers>0?`⚡ ${xovers} crossover${xovers!==1?'s':''}` :'';
  spEl('sp-f1-name').textContent=f1;
  spEl('sp-f2-name').textContent=f2;
  spEl('sp-note').style.display='none'; spEl('sp-note').textContent='';
  spEl('sp-legend').style.display='none';
  spEl('sp-chart-wrap').style.display='none';
  spEl('sp-controls').style.display='none';
  spEl('sp-replay').textContent='▶ Replay'; spEl('sp-replay').className='sc-btn play';
  spEl('sp-stop').style.display='none';
  spEl('sp-fill').style.width='0%';
  spEl('sp-prog').textContent='loading…';

  // Re-render table to highlight selected row
  renderTable();
  // Scroll so clicked row is visible near the top
  clickedRow.scrollIntoView({behavior:'smooth', block:'nearest'});

  try{
    const r=await fetch(`/api/fight-history/${encodeURIComponent(id)}`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    simReplayData=data;
    const h=data.oddsHistory||[];

    if(h.length===0){
      spEl('sp-note').textContent='No odds data recorded for this fight.';
      spEl('sp-note').style.display='block';
      spEl('sp-prog').textContent='';
      return;
    }
    if(h.length===1){
      spEl('sp-note').textContent='Only 1 data point captured — recording started as fight was ending.';
      spEl('sp-note').style.display='block';
      spEl('sp-prog').textContent='1 pt';
      return;
    }

    // Show full graph immediately
    spEl('sp-legend').style.display='flex';
    spEl('sp-chart-wrap').style.display='block';
    spEl('sp-controls').style.display='flex';
    initChart();
    renderFullGraph(h);

    // Enable replay only for fights with enough points
    spEl('sp-replay').style.display=h.length>1?'':'none';

  }catch(e){
    spEl('sp-note').textContent='Failed to load fight data.';
    spEl('sp-note').style.display='block';
    spEl('sp-prog').textContent='';
    console.error('sim load error:', e);
  }
}

// ── Table rendering ──────────────────────────────────────────────────────────

function sportBadgeClass(sport){
  const s=(sport||'').toUpperCase();
  if(s.includes('MMA')||s.includes('UFC')) return 'badge-ufc';
  if(s.includes('NHL')) return 'badge-nhl';
  if(s.includes('NBA')) return 'badge-nba';
  if(s.includes('NFL')) return 'badge-nfl';
  if(s.includes('MLB')) return 'badge-mlb';
  return 'badge-other';
}
function fmtDate(d){ if(!d) return '—'; const [y,m,day]=d.split('-'); return `${m}/${day}/${y.slice(2)}`; }

function sortedRecs(recs){
  const r=[...recs];
  if(sortMode==='xovers') return r.sort((a,b)=>b.crossovers-a.crossovers||(b.date||'').localeCompare(a.date||''));
  if(sortMode==='pts') return r.sort((a,b)=>b.dataPoints-a.dataPoints);
  return r.sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(b.startTime||'').localeCompare(a.startTime||''));
}

function renderTable(){
  const q=searchQuery.toLowerCase();
  let rows=allRecs.filter(r=>{
    if(activeSportFilter!=='all' && !r.sport.toUpperCase().includes(activeSportFilter.toUpperCase())) return false;
    if(q && !r.fighter1.toLowerCase().includes(q) && !r.fighter2.toLowerCase().includes(q)) return false;
    return true;
  });
  rows=sortedRecs(rows);
  document.getElementById('rec-count').textContent=`${rows.length} fight${rows.length!==1?'s':''}`;
  const tbody=document.getElementById('rec-body');
  if(!rows.length){ tbody.innerHTML='<tr><td colspan="6" style="color:#2a2a2a;padding:20px 12px">No results</td></tr>'; return; }

  tbody.innerHTML=rows.map(r=>`
    <tr class="rec-row${r.id===selectedRowId?' selected':''}" data-id="${r.id}" data-f1="${encodeURIComponent(r.fighter1)}" data-f2="${encodeURIComponent(r.fighter2)}" data-date="${r.date||''}" data-xovers="${r.crossovers}">
      <td><span class="sport-badge ${sportBadgeClass(r.sport)}">${r.sport}</span></td>
      <td class="fighters-cell">${r.fighter1} <span style="color:#333">vs</span> ${r.fighter2}</td>
      <td class="date-cell">${fmtDate(r.date)}</td>
      <td class="pts-cell">${r.dataPoints < 20 ? `<span style="color:#e67e22;font-weight:600" title="Low data — crossover count unreliable">⚠ ${r.dataPoints}</span>` : r.dataPoints.toLocaleString()}</td>
      <td class="xover-cell">${r.crossovers>0?`<span class="xover-badge">⚡ ${r.crossovers}</span>`:'<span class="xover-zero">—</span>'}</td>
      <td style="text-align:right"><button class="open-btn${r.id===selectedRowId?' active':''}" data-id="${r.id}">Simulate →</button></td>
    </tr>`).join('');

  // Re-insert expansion row after selected row (table was just re-rendered)
  if(selectedRowId){
    const selRow=tbody.querySelector(`.rec-row[data-id="${selectedRowId}"]`);
    if(selRow) selRow.after(simTr);
  }

  tbody.querySelectorAll('.rec-row').forEach(row=>{
    row.addEventListener('click', e=>{
      if(e.target.closest('.open-btn')) return;
      openSim(row.dataset.id, decodeURIComponent(row.dataset.f1), decodeURIComponent(row.dataset.f2), row.dataset.date, +row.dataset.xovers, row);
    });
  });
  tbody.querySelectorAll('.open-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const row=btn.closest('tr');
      openSim(btn.dataset.id, decodeURIComponent(row.dataset.f1), decodeURIComponent(row.dataset.f2), row.dataset.date, +row.dataset.xovers, row);
    });
  });
}

// ── Live recordings ──────────────────────────────────────────────────────────

async function stopRec(id){
  await fetch(`/api/recorder/stop/${encodeURIComponent(id)}`,{method:'POST'});
  loadLive(); load();
}
async function stopAll(){
  await fetch('/api/recorder/stop-all',{method:'POST'});
  loadLive(); load();
}
async function loadLive(){
  const d=await fetch('/api/recorder/status').then(r=>r.json());
  const el=document.getElementById('live-list');
  if(!d.recording||!d.activeFights.length){ el.innerHTML='<div class="no-live">No live recordings active — recorder is watching for fights</div>'; return; }
  el.innerHTML=`<div style="text-align:right;margin-bottom:6px">
    <button onclick="stopAll()" style="font-size:0.62rem;padding:4px 10px;background:#1a0a0a;border:1px solid #8b0000;border-radius:4px;color:#e74c3c;cursor:pointer">⏹ Stop All</button>
  </div>`+d.activeFights.map(f=>`
    <div class="live-card">
      <div class="live-dot"></div>
      <div style="flex:1">
        <div class="live-fighters">${f.fighter1} vs ${f.fighter2}</div>
        <div class="live-started">${f.sport} · started ${new Date(f.startTime).toLocaleTimeString()}</div>
      </div>
      <div class="live-pts">${f.dataPoints} pts recorded</div>
      <button onclick="stopRec('${f.id}')" style="font-size:0.6rem;padding:3px 8px;background:#1a0a0a;border:1px solid #8b0000;border-radius:3px;color:#e74c3c;cursor:pointer;margin-left:8px">⏹ Stop</button>
    </div>`).join('');
}

async function load(){
  allRecs=await fetch('/api/recordings').then(r=>r.json());
  renderTable();
  loadLive();
}

document.querySelectorAll('.filter-pill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeSportFilter=btn.dataset.sport;
    renderTable();
  });
});
document.getElementById('search-box').addEventListener('input', e=>{ searchQuery=e.target.value; renderTable(); });
document.getElementById('sort-sel').addEventListener('change', e=>{ sortMode=e.target.value; renderTable(); });

load();
setInterval(loadLive,5000);
</script>
